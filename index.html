<script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web"></script>
    <script>
        // 1. YOUR CREDENTIALS (PASTE CAREFULLY)
        const PUBLIC_KEY = '32e82d18-c5ba-4ba6-98de-8d80337b0787'; 
        const ASSISTANT_ID = '017a8940-056a-4ad5-9e35-1a4f467b7dd0';

        // 2. INITIALIZE VAPI
        const vapi = new Vapi(PUBLIC_KEY);
        let isCalling = false;

        // 3. THE TOGGLE FUNCTION
        async function toggleVapi() {
            const btnText = document.getElementById('vapi-text');
            const btnIcon = document.getElementById('vapi-icon');
            const btnElement = document.getElementById('vapi-trigger');

            if (!isCalling) {
                console.log("Attempting to connect to Vapi...");
                btnText.innerText = "CONNECTING...";
                
                try {
                    await vapi.start(ASSISTANT_ID);
                    isCalling = true;
                } catch (err) {
                    console.error("Vapi Start Error:", err);
                    alert("Connection failed. Check your console for details.");
                }
            } else {
                vapi.stop();
            }
        }

        // 4. LISTEN FOR CALL EVENTS TO UPDATE BUTTON
        vapi.on('call-start', () => {
            console.log("Call actually started");
            document.getElementById('vapi-text').innerText = "LISTENING (CLICK TO END)";
            document.getElementById('vapi-icon').innerText = "🟢";
            document.getElementById('vapi-trigger').style.backgroundColor = "#ef4444"; // Red
        });

        vapi.on('call-end', () => {
            console.log("Call ended");
            document.getElementById('vapi-text').innerText = "TALK TO OUR AI SPECIALIST";
            document.getElementById('vapi-icon').innerText = "🎙️";
            document.getElementById('vapi-trigger').style.backgroundColor = "#2563eb"; // Blue
            isCalling = false;
        });

        vapi.on('error', (e) => {
            console.error("Vapi Global Error:", e);
            isCalling = false;
        });
    </script>
