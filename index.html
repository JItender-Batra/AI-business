<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NZ ORCHESTRA | AI Voice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050810; color: white; -webkit-tap-highlight-color: transparent; }
        .hero-gradient { background: radial-gradient(circle at 50% 0%, #1e40af 0%, #050810 70%); }
    </style>
</head>
<body class="hero-gradient min-h-screen flex flex-col items-center justify-center p-6 text-center">

    <div class="max-w-md w-full">
        <h1 class="text-4xl font-black tracking-tighter mb-2">NZ<span class="text-blue-500">ORCHESTRA</span></h1>
        <p class="text-slate-400 mb-12 text-sm uppercase tracking-[0.2em]">Enterprise Voice AI</p>

        <button id="vapi-button" onclick="handleTap()" class="w-full py-8 bg-blue-600 rounded-3xl font-black text-2xl shadow-[0_0_50px_rgba(37,99,235,0.3)] transition-all active:scale-95 flex flex-col items-center justify-center gap-2">
            <span id="btn-icon">🎙️</span>
            <span id="btn-text">START CALL</span>
        </button>
        
        <div id="mobile-status" class="mt-8 p-4 bg-white/5 rounded-2xl border border-white/10 hidden">
            <p id="status-text" class="text-blue-400 font-bold text-sm">INITIALIZING...</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vapi-ai/web"></script>
    <script>
        // --- CONFIGURATION ---
        const PUBLIC_KEY = '32e82d18-c5ba-4ba6-98de-8d80337b0787';
        const ASSISTANT_ID = '017a8940-056a-4ad5-9e35-1a4f467b7dd0';

        const vapi = new Vapi(PUBLIC_KEY);
        let callActive = false;

        async function handleTap() {
            const btn = document.getElementById('vapi-button');
            const txt = document.getElementById('btn-text');
            const statusDiv = document.getElementById('mobile-status');
            const statusTxt = document.getElementById('status-text');

            // 1. MOBILE AUDIO UNLOCK (Crucial for 2026 browsers)
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }

            if (!callActive) {
                statusDiv.classList.remove('hidden');
                statusTxt.innerText = "REQUESTING MIC...";
                txt.innerText = "CONNECTING...";
                
                try {
                    // 2. START THE STREAM
                    await vapi.start(ASSISTANT_ID);
                    callActive = true;
                } catch (err) {
                    console.error(err);
                    statusTxt.innerText = "ERROR: MIC DENIED";
                    txt.innerText = "TRY AGAIN";
                    alert("Please allow microphone access in your browser settings.");
                }
            } else {
                vapi.stop();
            }
        }

        // --- EVENT LISTENERS ---
        vapi.on('call-start', () => {
            document.getElementById('btn-text').innerText = "END SESSION";
            document.getElementById('btn-icon').innerText = "🛑";
            document.getElementById('vapi-button').style.backgroundColor = "#ef4444";
            document.getElementById('status-text').innerText = "LIVE CONNECTION ACTIVE";
        });

        vapi.on('call-end', () => {
            document.getElementById('btn-text').innerText = "START CALL";
            document.getElementById('btn-icon').innerText = "🎙️";
            document.getElementById('vapi-button').style.backgroundColor = "#2563eb";
            document.getElementById('mobile-status').classList.add('hidden');
            callActive = false;
        });

        vapi.on('error', (e) => {
            console.error("Vapi Error:", e);
            document.getElementById('status-text').innerText = "CONNECTION FAILED";
            callActive = false;
        });
    </script>
</body>
</html>
